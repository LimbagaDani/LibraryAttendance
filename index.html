<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Attendance System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Library Attendance System</h1>
            <p class="date" id="currentDate"></p>
        </header>

        <main>
            <!-- Check-in Form -->
            <section class="card check-in-section">
                <h2>Visitor Check-In</h2>
                <form id="checkInForm">
                    <div class="form-group">
                        <label for="visitorName">Full Name</label>
                        <input type="text" id="visitorName" required placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label for="visitorId">ID Number</label>
                        <input type="text" id="visitorId" required placeholder="Student/Staff ID">
                    </div>
                    <div class="form-group">
                        <label for="purpose">Purpose of Visit</label>
                        <select id="purpose" required>
                            <option value="">Select purpose</option>
                            <option value="Study">Study</option>
                            <option value="Research">Research</option>
                            <option value="Borrow Books">Borrow Books</option>
                            <option value="Return Books">Return Books</option>
                            <option value="Use Computers">Use Computers</option>
                            <option value="Group Discussion">Group Discussion</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Check In</button>
                </form>
            </section>

            <!-- Statistics -->
            <section class="card stats-section">
                <h2>Today's Statistics</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-number" id="totalVisitors">0</span>
                        <span class="stat-label">Total Visitors</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="currentlyIn">0</span>
                        <span class="stat-label">Currently In</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="checkedOut">0</span>
                        <span class="stat-label">Checked Out</span>
                    </div>
                </div>
            </section>

            <!-- Attendance Table -->
            <section class="card table-section">
                <div class="table-header">
                    <h2>Attendance Log</h2>
                    <div class="table-actions">
                        <input type="text" id="searchInput" placeholder="Search by name or ID...">
                        <button class="btn btn-secondary" id="exportBtn">Export CSV</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table id="attendanceTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>ID</th>
                                <th>Purpose</th>
                                <th>Check-In</th>
                                <th>Check-Out</th>
                                <th>Duration</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceBody">
                        </tbody>
                    </table>
                </div>
                <p class="empty-message" id="emptyMessage">No attendance records for today.</p>
            </section>
        </main>

        <!-- Toast Notification -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
